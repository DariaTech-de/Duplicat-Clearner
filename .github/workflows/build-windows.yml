name: Build Windows App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --clean --noconfirm Duplicat-Clearner.spec

      - name: Create ZIP package
        run: |
          powershell Compress-Archive -Path dist\Duplicat-Clearner.exe -DestinationPath dist\Duplicat-Clearner-Windows.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Duplicat-Clearner-Windows
          path: dist/Duplicat-Clearner-Windows.zip
          if-no-files-found: error
